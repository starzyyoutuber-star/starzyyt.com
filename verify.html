<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Your Account</title>

<style>
* {
    box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
                height: 100vh;
                    background:
                            radial-gradient(circle at top, #7289da, #5865F2 45%, #404eed);
                                display: flex;
                                    align-items: center;
                                        justify-content: center;
                                            color: #f2f3f5;
                                            }

                                            .card {
                                                width: 360px;
                                                    background: #2b2d31;
                                                        padding: 30px;
                                                            border-radius: 8px;
                                                                text-align: center;
                                                                    box-shadow: 0 10px 30px rgba(0,0,0,.45);
                                                                    }

                                                                    /* Website Logo */
                                                                    .logo {
                                                                        text-align: center;
                                                                            font-size: 55px;
                                                                                color: #5865F2;
                                                                                    margin-bottom: 10px;
                                                                                        text-shadow: 0 4px 10px rgba(0,0,0,.3);
                                                                                        }

                                                                                        h1 {
                                                                                            font-size: 22px;
                                                                                                margin: 10px 0;
                                                                                                }

                                                                                                p {
                                                                                                    color: #b5bac1;
                                                                                                        font-size: 14px;
                                                                                                            line-height: 1.5;
                                                                                                            }

                                                                                                            .loader {
                                                                                                                width: 45px;
                                                                                                                    height: 45px;
                                                                                                                        margin: 25px auto;
                                                                                                                            border: 5px solid #404249;
                                                                                                                                border-top: 5px solid #5865F2;
                                                                                                                                    border-radius: 50%;
                                                                                                                                        animation: spin 1s linear infinite;
                                                                                                                                        }

                                                                                                                                        @keyframes spin {
                                                                                                                                            from {
                                                                                                                                                    transform: rotate(0deg);
                                                                                                                                                        }
                                                                                                                                                            to {
                                                                                                                                                                    transform: rotate(360deg);
                                                                                                                                                                        }
                                                                                                                                                                        }

                                                                                                                                                                        .status {
                                                                                                                                                                            background: #1e1f22;
                                                                                                                                                                                padding: 12px;
                                                                                                                                                                                    border-radius: 5px;
                                                                                                                                                                                        color: #dbdee1;
                                                                                                                                                                                            font-size: 13px;
                                                                                                                                                                                            }

                                                                                                                                                                                            .timer {
                                                                                                                                                                                                margin-top: 12px;
                                                                                                                                                                                                    color: #949ba4;
                                                                                                                                                                                                        font-size: 12px;
                                                                                                                                                                                                        }

                                                                                                                                                                                                        .footer {
                                                                                                                                                                                                            margin-top: 18px;
                                                                                                                                                                                                                font-size: 11px;
                                                                                                                                                                                                                    color: #949ba4;
                                                                                                                                                                                                                    }
                                                                                                                                                                                                                    </style>

                                                                                                                                                                                                                    </head>

                                                                                                                                                                                                                    <body>

                                                                                                                                                                                                                    <div class="card">

                                                                                                                                                                                                                        <div class="logo">
                                                                                                                                                                                                                                ☁
                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                        <h1>Verify Your Account</h1>

                                                                                                                                                                                                                                            <p>
                                                                                                                                                                                                                                                    Your account is being verified.
                                                                                                                                                                                                                                                            Please wait while we prepare your StarzyYT experience.
                                                                                                                                                                                                                                                                </p>

                                                                                                                                                                                                                                                                    <div class="loader"></div>

                                                                                                                                                                                                                                                                        <div class="status">
                                                                                                                                                                                                                                                                                Waiting for verification...
                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                        <div class="timer" id="timer">
                                                                                                                                                                                                                                                                                                Redirecting in 5 seconds...
                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                        <div class="footer">
                                                                                                                                                                                                                                                                                                                Secure verification powered by StarzyYT
                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                    </div>


                                                                                                                                                                                                                                                                                                                    <script>

                                                                                                                                                                                                                                                                                                                    let seconds = 5;

                                                                                                                                                                                                                                                                                                                    let timer = document.getElementById("timer");

                                                                                                                                                                                                                                                                                                                    let countdown = setInterval(function() {

                                                                                                                                                                                                                                                                                                                        seconds--;

                                                                                                                                                                                                                                                                                                                            timer.innerHTML = "Redirecting in " + seconds + " seconds...";

                                                                                                                                                                                                                                                                                                                                if (seconds <= 0) {

                                                                                                                                                                                                                                                                                                                                        clearInterval(countdown);

                                                                                                                                                                                                                                                                                                                                                window.location.href = "welcome.html";

                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                    }, 1000);

                                                                                                                                                                                                                                                                                                                                                    </script>


                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                    </html>
