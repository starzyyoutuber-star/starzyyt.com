<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarzyYT</title>

<style>
* {
    box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
                height: 100vh;
                    background:
                            radial-gradient(circle at top, #7289da, #5865F2 45%, #404eed);
                                display: flex;
                                    align-items: center;
                                        justify-content: center;
                                            color: #f2f3f5;
                                            }

                                            .container {
                                                width: 360px;
                                                    background: #2b2d31;
                                                        padding: 24px;
                                                            border-radius: 8px;
                                                                box-shadow: 0 10px 30px rgba(0,0,0,.45);
                                                                }

                                                                .logo {
                                                                    text-align: center;
                                                                        font-size: 34px;
                                                                            font-weight: bold;
                                                                                color: #5865F2;
                                                                                    margin-bottom: 8px;
                                                                                    }

                                                                                    h1 {
                                                                                        text-align: center;
                                                                                            font-size: 22px;
                                                                                                margin: 8px 0;
                                                                                                }

                                                                                                .subtitle {
                                                                                                    text-align: center;
                                                                                                        color: #b5bac1;
                                                                                                            font-size: 14px;
                                                                                                                margin-bottom: 20px;
                                                                                                                }

                                                                                                                label {
                                                                                                                    display: block;
                                                                                                                        color: #b5bac1;
                                                                                                                            font-size: 11px;
                                                                                                                                font-weight: bold;
                                                                                                                                    margin: 12px 0 6px;
                                                                                                                                        text-transform: uppercase;
                                                                                                                                        }

                                                                                                                                        input {
                                                                                                                                            width: 100%;
                                                                                                                                                padding: 10px;
                                                                                                                                                    background: #1e1f22;
                                                                                                                                                        border: 1px solid #1e1f22;
                                                                                                                                                            border-radius: 4px;
                                                                                                                                                                color: white;
                                                                                                                                                                    font-size: 14px;
                                                                                                                                                                        outline: none;
                                                                                                                                                                        }

                                                                                                                                                                        input:focus {
                                                                                                                                                                            border-color: #5865F2;
                                                                                                                                                                            }

                                                                                                                                                                            button {
                                                                                                                                                                                width: 100%;
                                                                                                                                                                                    margin-top: 18px;
                                                                                                                                                                                        padding: 11px;
                                                                                                                                                                                            background: #5865F2;
                                                                                                                                                                                                color: white;
                                                                                                                                                                                                    border: none;
                                                                                                                                                                                                        border-radius: 4px;
                                                                                                                                                                                                            font-size: 15px;
                                                                                                                                                                                                                font-weight: bold;
                                                                                                                                                                                                                    cursor: pointer;
                                                                                                                                                                                                                        transition: .2s;
                                                                                                                                                                                                                        }

                                                                                                                                                                                                                        button:hover {
                                                                                                                                                                                                                            background: #4752c4;
                                                                                                                                                                                                                            }

                                                                                                                                                                                                                            .login {
                                                                                                                                                                                                                                margin-top: 14px;
                                                                                                                                                                                                                                    text-align: center;
                                                                                                                                                                                                                                        color: #b5bac1;
                                                                                                                                                                                                                                            font-size: 13px;
                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                            .login a {
                                                                                                                                                                                                                                                color: #00a8fc;
                                                                                                                                                                                                                                                    text-decoration: none;
                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                    .login a:hover {
                                                                                                                                                                                                                                                        text-decoration: underline;
                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                        .terms {
                                                                                                                                                                                                                                                            margin-top: 15px;
                                                                                                                                                                                                                                                                font-size: 11px;
                                                                                                                                                                                                                                                                    color: #949ba4;
                                                                                                                                                                                                                                                                        text-align: center;
                                                                                                                                                                                                                                                                            line-height: 1.4;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            </style>

                                                                                                                                                                                                                                                                            </head>

                                                                                                                                                                                                                                                                            <body>

                                                                                                                                                                                                                                                                            <div class="container">

                                                                                                                                                                                                                                                                                <div class="logo">☁</div>

                                                                                                                                                                                                                                                                                    <h1>Create an Account</h1>

                                                                                                                                                                                                                                                                                        <div class="subtitle">
                                                                                                                                                                                                                                                                                                Join millions of communities on StarzyYT
                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                        <form>

                                                                                                                                                                                                                                                                                                                <label>Email</label>
                                                                                                                                                                                                                                                                                                                        <input type="email" placeholder="Enter your email">

                                                                                                                                                                                                                                                                                                                                <label>Username</label>
                                                                                                                                                                                                                                                                                                                                        <input type="text" placeholder="Choose a username">

                                                                                                                                                                                                                                                                                                                                                <label>Password</label>
                                                                                                                                                                                                                                                                                                                                                        <input type="password" placeholder="Create a password">

                                                                                                                                                                                                                                                                                                                                                                <button type="submit">
                                                                                                                                                                                                                                                                                                                                                                            Continue
                                                                                                                                                                                                                                                                                                                                                                                    </button>

                                                                                                                                                                                                                                                                                                                                                                                        </form>

                                                                                                                                                                                                                                                                                                                                                                                            <div class="terms">
                                                                                                                                                                                                                                                                                                                                                                                                    By registering, you agree to our Terms of Service and Privacy Policy.
                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                        </html>
