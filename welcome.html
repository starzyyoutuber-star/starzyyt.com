<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To StarzyYT</title>

<style>
* {
    box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
                height: 100vh;
                    background:
                            radial-gradient(circle at top, #7289da, #5865F2 45%, #404eed);
                                display: flex;
                                    justify-content: center;
                                        align-items: center;
                                            color: #f2f3f5;
                                            }

                                            .container {
                                                width: 360px;
                                                    background: #2b2d31;
                                                        padding: 30px;
                                                            border-radius: 8px;
                                                                text-align: center;
                                                                    box-shadow: 0 10px 30px rgba(0,0,0,.45);
                                                                    }

                                                                    .logo {
                                                                        text-align: center;
                                                                            font-size: 55px;
                                                                                color: #5865F2;
                                                                                    margin-bottom: 10px;
                                                                                        text-shadow: 0 4px 10px rgba(0,0,0,.3);
                                                                                        }

                                                                                        h1 {
                                                                                            font-size: 24px;
                                                                                                margin: 10px 0;
                                                                                                }

                                                                                                .subtitle {
                                                                                                    color: #b5bac1;
                                                                                                        font-size: 14px;
                                                                                                            line-height: 1.5;
                                                                                                                margin-bottom: 20px;
                                                                                                                }

                                                                                                                .badge {
                                                                                                                    background: #1e1f22;
                                                                                                                        padding: 12px;
                                                                                                                            border-radius: 5px;
                                                                                                                                color: #23a559;
                                                                                                                                    font-weight: bold;
                                                                                                                                        margin-bottom: 20px;
                                                                                                                                        }

                                                                                                                                        label {
                                                                                                                                            display: block;
                                                                                                                                                text-align: left;
                                                                                                                                                    color: #b5bac1;
                                                                                                                                                        font-size: 11px;
                                                                                                                                                            font-weight: bold;
                                                                                                                                                                margin: 12px 0 6px;
                                                                                                                                                                    text-transform: uppercase;
                                                                                                                                                                    }

                                                                                                                                                                    input {
                                                                                                                                                                        width: 100%;
                                                                                                                                                                            padding: 10px;
                                                                                                                                                                                background: #1e1f22;
                                                                                                                                                                                    border: 1px solid #1e1f22;
                                                                                                                                                                                        border-radius: 4px;
                                                                                                                                                                                            color: white;
                                                                                                                                                                                                outline: none;
                                                                                                                                                                                                    font-size: 14px;
                                                                                                                                                                                                    }

                                                                                                                                                                                                    input:focus {
                                                                                                                                                                                                        border-color: #5865F2;
                                                                                                                                                                                                        }

                                                                                                                                                                                                        button {
                                                                                                                                                                                                            width: 100%;
                                                                                                                                                                                                                padding: 12px;
                                                                                                                                                                                                                    margin-top: 20px;
                                                                                                                                                                                                                        background: #5865F2;
                                                                                                                                                                                                                            border: none;
                                                                                                                                                                                                                                border-radius: 4px;
                                                                                                                                                                                                                                    color: white;
                                                                                                                                                                                                                                        font-weight: bold;
                                                                                                                                                                                                                                            font-size: 15px;
                                                                                                                                                                                                                                                cursor: pointer;
                                                                                                                                                                                                                                                    transition: .2s;
                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                    button:hover {
                                                                                                                                                                                                                                                        background: #4752c4;
                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                        .footer {
                                                                                                                                                                                                                                                            margin-top: 18px;
                                                                                                                                                                                                                                                                color: #949ba4;
                                                                                                                                                                                                                                                                    font-size: 11px;
                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                    </style>

                                                                                                                                                                                                                                                                    </head>

                                                                                                                                                                                                                                                                    <body>

                                                                                                                                                                                                                                                                    <div class="container" id="page">

                                                                                                                                                                                                                                                                        <div class="logo">☁</div>

                                                                                                                                                                                                                                                                            <h1>Welcome To StarzyYT</h1>

                                                                                                                                                                                                                                                                                <div class="subtitle">
                                                                                                                                                                                                                                                                                        Your account is ready!
                                                                                                                                                                                                                                                                                                Welcome to the StarzyYT community.
                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                        <div class="badge">
                                                                                                                                                                                                                                                                                                                ✓ Account Verified
                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                        <button onclick="startQuestions()">
                                                                                                                                                                                                                                                                                                                                Enter StarzyYT
                                                                                                                                                                                                                                                                                                                                    </button>

                                                                                                                                                                                                                                                                                                                                        <div class="footer">
                                                                                                                                                                                                                                                                                                                                                Thanks for joining StarzyYT
                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                    </div>


                                                                                                                                                                                                                                                                                                                                                    <script>

                                                                                                                                                                                                                                                                                                                                                    function startQuestions() {

                                                                                                                                                                                                                                                                                                                                                        document.getElementById("page").innerHTML = `

                                                                                                                                                                                                                                                                                                                                                                <div class="logo">☁</div>

                                                                                                                                                                                                                                                                                                                                                                        <h1>Setup Your Account</h1>

                                                                                                                                                                                                                                                                                                                                                                                <div class="subtitle">
                                                                                                                                                                                                                                                                                                                                                                                            Answer a few questions to personalize your StarzyYT experience.
                                                                                                                                                                                                                                                                                                                                                                                                    </div>


                                                                                                                                                                                                                                                                                                                                                                                                            <label>What should we call you?</label>
                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="text" placeholder="Your username">


                                                                                                                                                                                                                                                                                                                                                                                                                            <label>What do you want to do on StarzyYT?</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="text" placeholder="Watch, create, share...">


                                                                                                                                                                                                                                                                                                                                                                                                                                            <label>What content do you like?</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="text" placeholder="Gaming, music, videos...">


                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button onclick="finishSetup()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Finish Setup
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    `;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }


                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function finishSetup() {

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        window.location.href = "dashboard.html";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
